assistant_scope:
  positioning: "Copilot interne de préparation patrimoniale pour CGP"
  in_scope:
    - préparation de rendez-vous
    - lecture et structuration des inputs client
    - complétude dossier
    - aide conformité opérationnelle
    - détection d'opportunités commerciales à investiguer
    - préparation de synthèses internes
  out_of_scope:
    - remplacement du CRM
    - étude patrimoniale exhaustive type suite métier historique
    - recommandation finale autonome
    - validation juridique ou conformité finale

